<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Advent of Code 2021 - Day {{ day }}</title>
    <style rel="stylesheet">
        html {
            font-family: arial, sans-serif;
            padding: 0 1em;
        }
        h1 {
            font-size: 1.75em;
            line-height: 1em;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.25em;
        }
        textarea, button {
            border-radius: 0.25em;
            padding: 0.75em;
        }
        textarea {
            background-color: whitesmoke;
            border-color: lightgray;
            height: 16em;
            width: 56em;
        }
        button {
            background-color: mediumslateblue;
            border: none;
            color: whitesmoke;
            margin: 1em 0;
            padding: 0.75em 2em;
        }
        button:hover {
            background-color: slateblue;
            cursor: pointer;
        }
        table {
            border-collapse: collapse;
            font-family: monospace;
            margin-top: 1em;
        }
        thead tr th {
            border-top: solid gray 1px;
        }
        thead th {
            text-transform: uppercase;
        }
        th:not(:last-child), td:not(:last-child) {
            padding-right: 2em;
        }
        th:last-child, td:last-child {
            min-width: 5em;
        }
        th {
            text-align: left;
        }
        td {
            white-space: pre;
        }
        .error {
            color: red;
        }
    </style>
    <script>const exports = {}, module = null, require = () => null</script>
    <script src="index.js"></script>
</head>
<body>
<div>
    <h1>Advent of Code 2021 - Day {{ day }}: {{ title }}</h1>
    <p><a href="https://adventofcode.com/2021/day/{{ day }}">View Task</a></p>
</div>
<div>
    <div>
        <label for="input">Input</label>
        <div>
            <textarea id="input" name="input">{{ input }}</textarea>
        </div>
    </div>
    <div>
        <button onclick="solveOnClick()">Solve</button>
    </div>
</div>
<table>
    <thead>
    <tr>
        <th style="min-width: 4em">Part</th>
        <th style="min-width: 20em">Result</th>
        <th>Time</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <th>1.</th>
        <td id="p1_result">-</td>
        <td id="p1_elapsed">-</td>
    </tr>
    <tr>
        <th>2.</th>
        <td id="p2_result">-</td>
        <td id="p2_elapsed">-</td>
    </tr>
    </tbody>
</table>
<script>
    const input = document.getElementById('input')
    const button = document.querySelector('button')
    const p1Result = document.getElementById('p1_result')
    const p1Elapsed = document.getElementById('p1_elapsed')
    const p2Result = document.getElementById('p2_result')
    const p2Elapsed = document.getElementById('p2_elapsed')

    function solveOnClick() {
        button.disabled = true
        p1Result.innerText = '-'
        p1Elapsed.innerText = '-'
        p2Result.innerText = '-'
        p2Elapsed.innerText = '-'

        try {
            const startedAt = window.performance.now()
            const result = partOne(input.value)
            p1Result.innerText = result
            const elapsed = Math.round((window.performance.now() - startedAt) * 10) / 10
            p1Elapsed.innerText = `${elapsed} ms`
        } catch (e) {
            p1Result.innerHTML = `<span class="error">ERROR: ${e}</span>`
        } finally {
            button.disabled = false
        }

        try {
            const startedAt = window.performance.now()
            const result = partTwo(input.value)
            p2Result.innerText = result
            const elapsed = Math.round((window.performance.now() - startedAt) * 10) / 10
            p2Elapsed.innerText = `${elapsed} ms`
        } catch (e) {
            p2Result.innerHTML = `<span class="error">ERROR: ${e}</span>`
        } finally {
            button.disabled = false
        }
    }
</script>
</body>
</html>
